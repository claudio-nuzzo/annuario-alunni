<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alumni Stradivari – Nel mondo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1814;
    --border: #2e2b24;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --text: #f0ece0;
    --text-muted: #8a8270;
    --moda: #d4547a;
    --arredo: #5b9bd4;
    --artistico: #7bc47f;
    --musicale: #c47bbc;
    --liuteria: #e8a44a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    position: relative;
    padding: 3rem 2rem 2rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #1a1510 0%, var(--bg) 100%);
  }

  .header-ornament {
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.8rem;
    opacity: 0.8;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    font-weight: 400;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 0.4rem;
  }

  h1 em {
    font-style: italic;
    color: var(--gold-light);
  }

  .subtitle {
    font-size: 0.9rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    margin-top: 0.5rem;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 2.5rem;
    padding: 1.2rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
  }

  .stat-number {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--gold);
    display: block;
    line-height: 1;
  }

  .stat-label {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* FILTERS */
  .filters {
    display: flex;
    justify-content: center;
    gap: 0.6rem;
    padding: 1rem 2rem;
    flex-wrap: wrap;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }

  .filter-btn {
    padding: 0.4rem 1rem;
    border-radius: 2rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover, .filter-btn.active {
    color: var(--bg);
    border-color: transparent;
  }

  .filter-btn[data-filter="tutti"].active { background: var(--gold); color: var(--bg); }
  .filter-btn[data-filter="Moda"].active { background: var(--moda); }
  .filter-btn[data-filter="Arredo"].active { background: var(--arredo); }
  .filter-btn[data-filter="Liceo Artistico"].active { background: var(--artistico); }
  .filter-btn[data-filter="Liceo Musicale"].active { background: var(--musicale); }
  .filter-btn[data-filter="Liuteria"].active { background: var(--liuteria); }

  /* LAYOUT */
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 340px;
    height: calc(100vh - 220px);
    min-height: 500px;
  }

  /* MAP */
  #map {
    width: 100%;
    height: 100%;
    background: #1a1814;
  }

  .leaflet-container {
    background: #1a1814 !important;
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .sidebar-header {
    padding: 1.2rem 1.4rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }

  .alumni-list {
    flex: 1;
  }

  .alumni-card {
    padding: 1rem 1.4rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .alumni-card:hover {
    background: rgba(201, 168, 76, 0.05);
  }

  .alumni-card.selected {
    background: rgba(201, 168, 76, 0.08);
  }

  .alumni-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .alumni-card.selected::before,
  .alumni-card:hover::before { opacity: 1; }

  .alumni-card[data-indirizzo="Moda"]::before { background: var(--moda); }
  .alumni-card[data-indirizzo="Arredo"]::before { background: var(--arredo); }
  .alumni-card[data-indirizzo="Liceo Artistico"]::before { background: var(--artistico); }
  .alumni-card[data-indirizzo="Liceo Musicale"]::before { background: var(--musicale); }
  .alumni-card[data-indirizzo="Liuteria"]::before { background: var(--liuteria); }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--text);
    margin-bottom: 0.2rem;
  }

  .card-meta {
    font-size: 0.75rem;
    color: var(--text-muted);
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    margin-bottom: 0.4rem;
  }

  .tag {
    display: inline-block;
    padding: 0.1rem 0.5rem;
    border-radius: 1rem;
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .tag-moda { background: rgba(212,84,122,0.2); color: var(--moda); }
  .tag-arredo { background: rgba(91,155,212,0.2); color: var(--arredo); }
  .tag-artistico { background: rgba(123,196,127,0.2); color: var(--artistico); }
  .tag-musicale { background: rgba(196,123,188,0.2); color: var(--musicale); }
  .tag-liuteria { background: rgba(232,164,74,0.2); color: var(--liuteria); }

  .card-job {
    font-size: 0.82rem;
    color: var(--text);
    opacity: 0.75;
  }

  .card-location {
    font-size: 0.75rem;
    color: var(--gold);
    margin-top: 0.2rem;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  /* POPUP */
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
    color: var(--text) !important;
    padding: 0 !important;
  }

  .leaflet-popup-tip {
    background: var(--surface) !important;
  }

  .leaflet-popup-content {
    margin: 0 !important;
    width: 260px !important;
  }

  .popup-inner {
    padding: 1.2rem;
  }

  .popup-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    margin-bottom: 0.3rem;
  }

  .popup-meta {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 0.6rem;
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .popup-job {
    font-size: 0.85rem;
    margin-bottom: 0.6rem;
    color: var(--text);
    opacity: 0.9;
  }

  .popup-quote {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.82rem;
    color: var(--gold-light);
    border-left: 2px solid var(--gold);
    padding-left: 0.7rem;
    margin-top: 0.6rem;
    line-height: 1.5;
  }

  .popup-instagram {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    margin-top: 0.7rem;
    font-size: 0.75rem;
    color: var(--gold);
    text-decoration: none;
    opacity: 0.8;
    transition: opacity 0.2s;
  }
  .popup-instagram:hover { opacity: 1; }

  .leaflet-popup-close-button {
    color: var(--text-muted) !important;
    font-size: 1.2rem !important;
    top: 8px !important;
    right: 10px !important;
  }

  /* EMPTY STATE */
  .empty-state {
    padding: 3rem 1.4rem;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.85rem;
    display: none;
  }

  /* CTA PARTECIPA */
  .cta-partecipa {
    padding: 1rem 1.4rem;
    border-top: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    bottom: 0;
  }

  .cta-btn {
    display: block;
    width: 100%;
    padding: 0.7rem;
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s;
  }

  .cta-btn:hover { background: var(--gold-light); }

  /* LOADING */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.5s;
  }

  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loading-logo {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--gold);
    margin-bottom: 1rem;
  }

  .loading-bar {
    width: 120px;
    height: 1px;
    background: var(--border);
    overflow: hidden;
  }

  .loading-bar-inner {
    height: 100%;
    background: var(--gold);
    animation: loading 1.5s ease-in-out infinite;
  }

  @keyframes loading {
    0% { width: 0; margin-left: 0; }
    50% { width: 100%; margin-left: 0; }
    100% { width: 0; margin-left: 100%; }
  }

  @media (max-width: 768px) {
    .main-layout {
      grid-template-columns: 1fr;
      grid-template-rows: 55vh 1fr;
      height: auto;
    }
    .sidebar {
      border-left: none;
      border-top: 1px solid var(--border);
      max-height: 45vh;
    }
    .stats-bar { gap: 1.5rem; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-logo">✦ Stradivari</div>
  <div class="loading-bar"><div class="loading-bar-inner"></div></div>
</div>

<header>
  <div class="header-ornament">Istituto d'Istruzione Superiore Antonio Stradivari · Cremona</div>
  <h1>Alumni <em>nel mondo</em></h1>
  <div class="subtitle">Dove ci ha portato lo Stradivari</div>
</header>

<div class="stats-bar">
  <div class="stat">
    <span class="stat-number" id="statTotale">—</span>
    <span class="stat-label">Alumni</span>
  </div>
  <div class="stat">
    <span class="stat-number" id="statPaesi">—</span>
    <span class="stat-label">Paesi</span>
  </div>
  <div class="stat">
    <span class="stat-number" id="statCitta">—</span>
    <span class="stat-label">Città</span>
  </div>
  <div class="stat">
    <span class="stat-number" id="statAnni">—</span>
    <span class="stat-label">Anni di diploma</span>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="tutti">Tutti</button>
  <button class="filter-btn" data-filter="Moda">Moda</button>
  <button class="filter-btn" data-filter="Arredo">Arredo</button>
  <button class="filter-btn" data-filter="Liceo Artistico">Liceo Artistico</button>
  <button class="filter-btn" data-filter="Liceo Musicale">Liceo Musicale</button>
  <button class="filter-btn" data-filter="Liuteria">Liuteria</button>
</div>

<div class="main-layout">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-header" id="sidebarHeader">Alumni — tutti gli indirizzi</div>
    <div class="alumni-list" id="alumniList"></div>
    <div class="empty-state" id="emptyState">Nessun alumni in questo indirizzo</div>
    <div class="cta-partecipa">
      <a class="cta-btn" id="formLink" href="#" target="_blank">✦ Sei un ex studente? Raccontaci la tua storia</a>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIGURAZIONE — modifica questi valori
// ============================================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz6dbYxGd-gCyuRs0KFrA8dHNoPemCGFmeWU5JcGc7pgM4rfqxuYW9RVL38oGpsdmBscA/exec'; // es: https://script.google.com/macros/s/xxx/exec
const FORM_URL   = 'https://forms.gle/a2Pr4aRS3kiYzWQM7';

// ============================================================
// DATI DI ESEMPIO (vengono sostituiti dai dati reali del Form)
// ============================================================
const DEMO_DATA = [
  { nome: 'Giulia Ferretti', anno: 2018, indirizzo: 'Moda', citta: 'Milano', lavoro: 'Fashion designer – Marni', frase: 'Lo Stradivari mi ha insegnato che la moda è arte, non solo abbigliamento.', instagram: 'giulia.ferretti', lat: 45.4654, lng: 9.1859 },
  { nome: 'Marco Albini', anno: 2015, indirizzo: 'Liuteria', citta: 'Berlino', lavoro: 'Liutaio – atelier proprio', frase: 'Ho imparato a sentire il legno prima ancora di vederlo finito.', instagram: '', lat: 52.5200, lng: 13.4050 },
  { nome: 'Sara Bianchi', anno: 2020, indirizzo: 'Liceo Musicale', citta: 'Vienna', lavoro: 'Violinista – Orchestra Filarmonica di Vienna', frase: 'Cremona nel cuore, Vienna sul palco.', instagram: 'sara.bianchi.violin', lat: 48.2082, lng: 16.3738 },
  { nome: 'Luca Torretti', anno: 2017, indirizzo: 'Arredo', citta: 'Londra', lavoro: 'Interior designer – Foster + Partners', frase: 'La scuola mi ha dato occhio critico e mani abili.', instagram: '', lat: 51.5074, lng: -0.1278 },
  { nome: 'Chiara Negri', anno: 2019, indirizzo: 'Liceo Artistico', citta: 'Parigi', lavoro: 'Illustratrice freelance', frase: 'Ogni progetto scolastico era già una piccola mostra.', instagram: 'chiara.negri.art', lat: 48.8566, lng: 2.3522 },
  { nome: 'Andrea Rossi', anno: 2016, indirizzo: 'Liuteria', citta: 'Cremona', lavoro: 'Liutaio – bottega propria', frase: 'Non ho mai lasciato Cremona. Non ne avevo bisogno.', instagram: 'rossi.liutaio', lat: 45.1332, lng: 10.0227 },
  { nome: 'Valentina Mora', anno: 2021, indirizzo: 'Moda', citta: 'New York', lavoro: 'Stylist – Vogue US', frase: 'Da Cremona a Manhattan: lo stile non ha confini.', instagram: 'vale.mora.style', lat: 40.7128, lng: -74.0060 },
  { nome: 'Pietro Galli', anno: 2014, indirizzo: 'Liceo Musicale', citta: 'Tokyo', lavoro: 'Pianista e compositore', frase: 'La musica è la lingua più universale che conosco.', instagram: '', lat: 35.6762, lng: 139.6503 },
];

// ============================================================
// COLORI PER INDIRIZZO
// ============================================================
const COLORS = {
  'Moda':           '#d4547a',
  'Arredo':         '#5b9bd4',
  'Liceo Artistico':'#7bc47f',
  'Liceo Musicale': '#c47bbc',
  'Liuteria':       '#e8a44a',
};

const TAG_CLASS = {
  'Moda':           'tag-moda',
  'Arredo':         'tag-arredo',
  'Liceo Artistico':'tag-artistico',
  'Liceo Musicale': 'tag-musicale',
  'Liuteria':       'tag-liuteria',
};

// ============================================================
// INIT MAPPA
// ============================================================
const map = L.map('map', {
  center: [48, 14],
  zoom: 4,
  zoomControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  maxZoom: 18,
}).addTo(map);

// ============================================================
// STATO
// ============================================================
let allData = [];
let markers = [];
let currentFilter = 'tutti';
let selectedCard = null;

// ============================================================
// ICONA CUSTOM
// ============================================================
function createIcon(indirizzo) {
  const color = COLORS[indirizzo] || '#c9a84c';
  return L.divIcon({
    className: '',
    html: `<div style="
      width:14px;height:14px;border-radius:50%;
      background:${color};
      border:2px solid rgba(255,255,255,0.3);
      box-shadow:0 0 10px ${color}88;
      cursor:pointer;
    "></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
  });
}

// ============================================================
// POPUP HTML
// ============================================================
function popupHTML(d) {
  const ig = d.instagram ? `<a class="popup-instagram" href="https://instagram.com/${d.instagram.replace('@','')}" target="_blank">↗ @${d.instagram.replace('@','')}</a>` : '';
  const frase = d.frase ? `<div class="popup-quote">"${d.frase}"</div>` : '';
  return `<div class="popup-inner">
    <div class="popup-name">${d.nome}</div>
    <div class="popup-meta">
      <span class="tag ${TAG_CLASS[d.indirizzo]}">${d.indirizzo}</span>
      <span>· ${d.anno}</span>
      <span>· ${d.citta}</span>
    </div>
    <div class="popup-job">${d.lavoro}</div>
    ${frase}
    ${ig}
  </div>`;
}

// ============================================================
// CARD SIDEBAR HTML
// ============================================================
function cardHTML(d, idx) {
  const loc = d.citta;
  return `<div class="alumni-card" data-indirizzo="${d.indirizzo}" data-idx="${idx}" onclick="selectAlumni(${idx})">
    <div class="card-name">${d.nome}</div>
    <div class="card-meta">
      <span class="tag ${TAG_CLASS[d.indirizzo]}">${d.indirizzo}</span>
      <span>${d.anno}</span>
    </div>
    <div class="card-job">${d.lavoro}</div>
    <div class="card-location">↗ ${loc}</div>
  </div>`;
}

// ============================================================
// RENDER
// ============================================================
function render(data) {
  // Rimuovi marker esistenti
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const list = document.getElementById('alumniList');
  const empty = document.getElementById('emptyState');
  list.innerHTML = '';

  const filtered = currentFilter === 'tutti' ? data : data.filter(d => d.indirizzo === currentFilter);

  if (filtered.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  filtered.forEach((d, i) => {
    // Marker
    const marker = L.marker([d.lat, d.lng], { icon: createIcon(d.indirizzo) })
      .addTo(map)
      .bindPopup(popupHTML(d), { maxWidth: 280 });
    marker.on('click', () => highlightCard(i));
    markers.push(marker);

    // Card
    list.innerHTML += cardHTML(d, i);
  });

  // Aggiorna header sidebar
  const label = currentFilter === 'tutti' ? 'tutti gli indirizzi' : currentFilter;
  document.getElementById('sidebarHeader').textContent = `Alumni — ${label} (${filtered.length})`;
}

// ============================================================
// SELEZIONE
// ============================================================
function selectAlumni(idx) {
  const cards = document.querySelectorAll('.alumni-card');
  cards.forEach(c => c.classList.remove('selected'));
  const card = document.querySelector(`.alumni-card[data-idx="${idx}"]`);
  if (card) card.classList.add('selected');

  const marker = markers[idx];
  if (marker) {
    map.setView(marker.getLatLng(), Math.max(map.getZoom(), 6), { animate: true });
    marker.openPopup();
  }
}

function highlightCard(idx) {
  const cards = document.querySelectorAll('.alumni-card');
  cards.forEach(c => c.classList.remove('selected'));
  const card = document.querySelector(`.alumni-card[data-idx="${idx}"]`);
  if (card) {
    card.classList.add('selected');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ============================================================
// FILTRI
// ============================================================
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render(allData);
  });
});

// ============================================================
// STATISTICHE
// ============================================================
function updateStats(data) {
  document.getElementById('statTotale').textContent = data.length;
  const paesi = new Set(data.map(d => d.citta)).size;
  document.getElementById('statPaesi').textContent = paesi;
  const citta = new Set(data.map(d => d.citta)).size;
  document.getElementById('statCitta').textContent = citta;
  const anni = new Set(data.map(d => d.anno));
  const minAnno = Math.min(...anni);
  const maxAnno = Math.max(...anni);
  document.getElementById('statAnni').textContent = minAnno === maxAnno ? minAnno : `${minAnno}–${maxAnno}`;
}

// ============================================================
// CARICA DATI
// ============================================================
async function loadData() {
  document.getElementById('formLink').href = FORM_URL || '#';

  try {
    if (SCRIPT_URL && SCRIPT_URL !== 'QUI_URL_DEL_TUO_APPS_SCRIPT') {
      const res = await fetch(SCRIPT_URL);
      const json = await res.json();
      allData = json.filter(d => d.lat && d.lng);
    } else {
      // Usa dati demo
      allData = DEMO_DATA;
    }
  } catch(e) {
    allData = DEMO_DATA;
  }

  updateStats(allData);
  render(allData);

  // Nascondi loading
  setTimeout(() => {
    document.getElementById('loadingOverlay').classList.add('hidden');
  }, 600);
}

loadData();
</script>
